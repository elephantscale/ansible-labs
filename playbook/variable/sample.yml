---

- hosts: webservers
  name: A play with variables
  gather_facts: no

  vars:
    name: Jonh
    family: Doe


  tasks:

    - name: Print Some variables
      debug:
        msg: "Hello, {{ name }}"

    - name: Print Some variables
      debug:
        msg: "Hello, {{ family }}"

    - name: Print Some variables
      debug:
        msg: "{{ name }}, {{ family }}"
