---

- name: Conditional play
  gather_facts: no 
  hosts: webservers

  vars_prompt:

    - name: question
      prompt: enter a value (yes/no)
      private: no
      default: yes


  vars:
    epic: true   #false or true

    #question: "yes"  # 0 = no = fasle  | 1 = yes = true   

    distro: "Ubuntu"

  tasks:

    - name: "Print if epic is true"
      when: 
        - question | bool  
        - distro == "Ubuntu"

      debug: 
        msg: "Task 1"

    - name: "print if epic is false"
      when: not question | bool  or epic
      debug:
        msg: "Task 2"
      




